<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhật ký cập nhật – EAnh</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --surface:#111111;
  --surface2:#1a1a1a;
  --border:#222222;
  --border2:#2a2a2a;
  --text:#e8e8e8;
  --muted:#666;
  --dim:#444;
  --accent:#00e5ff;
  --accent2:#7c3aed;
  --green:#22c55e;
  --red:#ef4444;
  --yellow:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;padding:0}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--accent);letter-spacing:-.3px}
.logo span{color:var(--muted)}>_</logo>
.topbar-badge{font-size:11px;font-weight:600;background:rgba(0,229,255,.08);color:var(--accent);border:1px solid rgba(0,229,255,.2);border-radius:5px;padding:2px 8px}
.back-btn{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border2);border-radius:7px;transition:all .2s}
.back-btn:hover{color:var(--text);border-color:var(--dim)}

/* HERO */
.hero{padding:40px 20px 28px;max-width:760px;margin:0 auto}
.hero-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;opacity:.7}
.hero-title{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.5px;line-height:1.3;margin-bottom:6px}
.hero-sub{font-size:13px;color:var(--muted);line-height:1.6}
.hero-meta{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.meta-item{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:5px}
.meta-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;opacity:.6}

/* ADMIN PANEL */
.admin-panel{display:none;max-width:760px;margin:0 auto 0;padding:0 20px 20px}
body.is-admin .admin-panel{display:block}
.admin-box{background:var(--surface);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:18px;margin-bottom:16px}
.admin-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--yellow);margin-bottom:14px;letter-spacing:.05em}
.form-row{display:grid;grid-template-columns:180px 1fr;gap:10px;margin-bottom:10px}
.form-input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{resize:vertical;min-height:80px;line-height:1.5}
.btn-save{padding:9px 18px;background:var(--green);color:#000;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-save:hover{filter:brightness(1.1)}
.copy-box{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:14px;margin-top:12px;display:none}
.copy-label{font-size:11px;color:var(--yellow);font-family:'JetBrains Mono',monospace;margin-bottom:8px;letter-spacing:.05em}
.copy-textarea{width:100%;font-family:'JetBrains Mono',monospace;font-size:11px;background:transparent;color:#7dd3fc;border:none;outline:none;resize:none;min-height:100px;line-height:1.5}
.btn-copy{padding:7px 14px;background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.2);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px;transition:all .2s}
.btn-copy:hover{background:rgba(0,229,255,.18)}

/* LOG LIST */
.log-wrap{max-width:760px;margin:0 auto;padding:0 20px 60px}
.log-count{font-size:12px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}

.log-item{border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:12px;background:var(--surface);position:relative;transition:border-color .2s}
.log-item:hover{border-color:var(--border2)}
.log-item::before{content:'';position:absolute;left:0;top:12px;bottom:12px;width:2px;background:var(--accent);border-radius:0 1px 1px 0;opacity:.35}
.log-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.05em;margin-bottom:10px;opacity:.8}
.log-content{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;opacity:.9}
.log-actions{display:none;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
body.is-admin .log-actions{display:flex}
.btn-edit{padding:5px 12px;background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-edit:hover{background:rgba(245,158,11,.2)}
.btn-del{padding:5px 12px;background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-del:hover{background:rgba(239,68,68,.18)}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;padding:20px 0 8px}
.page-btn{padding:7px 14px;border:1px solid var(--border2);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);background:var(--surface);font-family:'Inter',sans-serif;transition:all .2s;min-width:40px}
.page-btn:hover:not(:disabled){color:var(--text);border-color:var(--dim)}
.page-btn:disabled{opacity:.3;cursor:default}
.page-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.page-info{font-size:11px;color:var(--dim);text-align:center;width:100%;margin-top:4px;font-family:'JetBrains Mono',monospace}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--dim);font-size:13px}

@media(max-width:600px){
  .hero{padding:24px 16px 20px}
  .hero-title{font-size:20px}
  .log-wrap{padding:0 16px 60px}
  .admin-panel{padding:0 16px 16px}
  .form-row{grid-template-columns:1fr}
  .topbar{padding:0 14px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">EAnh <span style="color:var(--muted)">/ changelog</span></span>
    <span class="topbar-badge">Nhật ký</span>
  </div>
  <a href="https://anh29.ct.ws/pages/profile.html" class="back-btn">← Về trang chủ</a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">// release notes</div>
  <div class="hero-title">Nhật ký cập nhật</div>
  <div class="hero-sub">Toàn bộ lịch sử thay đổi, sửa lỗi và tính năng mới của hệ thống EAnh.</div>
  <div class="hero-meta">
    <div class="meta-item"><div class="meta-dot"></div>Developer: Nguyen Hoang Anh</div>
    <div class="meta-item"><div class="meta-dot"></div>Nickname: Ju</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel">
  <div class="admin-box">
    <div class="admin-title">// ADMIN — Thêm / Sửa bản ghi</div>
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <input type="date" id="log-date" class="form-input">
      <textarea id="log-content" class="form-input" placeholder="Nội dung cập nhật..."></textarea>
    </div>
    <button class="btn-save" onclick="saveLog()">💾 Lưu & Tạo code</button>
    <div class="copy-box" id="copy-box">
      <div class="copy-label">// COPY đoạn này thay vào const defaultData = [...] trong file HTML</div>
      <textarea id="generated-code" class="copy-textarea" readonly></textarea>
      <button class="btn-copy" onclick="copyCode()">📋 Copy code</button>
    </div>
  </div>
</div>

<!-- LOG LIST -->
<div class="log-wrap">
  <div class="log-count" id="log-count"></div>
  <div id="log-list"></div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
// ── ADMIN ──
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('pass') === 'eanh') document.body.classList.add('is-admin');
const isAdmin = document.body.classList.contains('is-admin');
////////////////
  ////////////// Thay the cap nhat o day
  ///////////
  //////////
  ///////////
const defaultData = [
    { id: 1776444202779, date: "2026-04-17", content: "Version v1.2.1.STABLE\n- Tối ưu hóa giao diện trên nhiều thiết bị hơn\n- Hỗ trợ Hướng dẫn người mới \n- Cập nhật lịch sử phiên bản\n- Sửa lỗi kiểm tra từ vựng hiển thị không như mong muốn" },
    { id: 1775725754041, date: "2026-04-09", content: "Version v1.2.1.STABLE\n\n- Cải thiện chế độ dịch thuật\n- Thêm chức năng ghi bảng tạm ở Dịch thuật \n- Cải tiến giao diện hồ sơ\n- Thêm nút nhảy link tải APK ( Lưu ý APK sẽ chưa được cập nhật )" },
    { id: 1774611258207, date: "2026-03-27", content: "Version v1.2.0.STABLE\n\n* Dự án đã được tái cấu trúc toàn diện nhằm tối ưu hiệu năng và trải nghiệm người dùng.\n* Các module trọng tâm được triển khai trước gồm: Tổng quan, Từ vựng, Ngữ pháp và Thi thử.\n* Trong giai đoạn đầu của phiên bản này, một số lỗi có thể vẫn còn tồn tại trong quá trình sử dụng.\n* Một số nội dung và dữ liệu hiển thị có thể chưa hoàn toàn chính xác.\n* Mọi góp ý hoặc yêu cầu điều chỉnh, vui lòng gửi qua mục Góp ý trong phần Hồ sơ." },
    { id: 1774542217448, date: "2026-03-26", content: "Version V1.1_26326.STABLE\nThêm mới\n- Cải tiến hoàn toàn giao diện\n- Bản dịch thuật ở ngay trên giao diện Desktop hoặc Mobile ( Thêm ) \n- Cải tiến tốc độ khung hình hỗ trợ thêm nhiều thiết bị đời cũ.\n- Bạn có thể bấm dịch ngay ở trên Trang tổng quan\n- Trang dịch thuật được thiết kế hướng tới con người làm trung tâm." },
    { id: 1774343588188, date: "2026-03-24", content: "Version V1.1_24326.RELEASE\nNội dung:\n- Tối ưu hóa giao diện và bố cục trên Mobile\n- Xuất bản ứng dụng APK ( Android ) dạng Webview\nThêm mới:\n- Giờ đây bạn có thể chỉnh 2 chế độ sáng tối \n- Hộp thư góp ý sẽ được bổ sung sau phiên bản 24316RELEASE ( Truy cập vào mục Hồ sơ )" },
    { id: 1774079790711, date: "2026-03-21", content: "Version V1.1_21326.RELEASE.TEST\nThêm mới:\n- Tính năng tìm kiếm được tích hợp vào trang tổng quan ( Tìm kiếm tất cả danh mục )\n- Tìm kiếm từng danh mục sẽ xuất hiện trong từng trang bạn chọn.\n- Thông báo cơ bản được bổ sung về tiến độ học, vui lòng nhấn vào icon thông báo." },
    { id: 1774025223174, date: "2026-03-20", content: "Version V1.1_20326.TEST\nSửa lỗi:\n- Ảnh đại diện bị mất sau khi người dùng đăng xuất\n- Phân lại quyền Admin tại trang người dùng\nThêm mới:\n- Người dùng không cần phải đăng nhập lại sau khi đã ghi nhớ đăng nhập ( Lưu ý 1 phiên đăng nhập sẽ kéo dài đến 23:59 nếu người dùng không đăng xuất ) \n- Bạn có thể yêu cầu lấy lại mật khẩu bảo mật hơn qua xác thực Email chính chủ." },
    { id: 1773989885184, date: "2026-03-19", content: "Version V1.1_19326.TEST\n- Thêm chức năng đổi ảnh đại diện đồng bộ" },
    { id: 1773909012435, date: "2026-03-18", content: "Cập nhật phiên bản: \nVersion V1.1_19326.TEST\nThêm mới:\n- Cập nhật chức năng đọc từ vựng\n- Giờ đây bạn có thể kiểm tra từ khóa đã học\n- Các từ đã học sẽ được lưu vào mục ưu tiên nếu bạn đã đúng 5 lần kiểm tra \n- Thêm chức năng xóa sạch dữ liệu đã học của mục từ vựng \n- Giờ đây bạn có thể xem phiên bản cập nhật tại: Hồ sơ" },
    { id: 1773760989511, date: "2026-03-17", content: "Version V1.0_17326.DEMO.TEST\nBảo trì hoàn tất ( 14:24 - 18/3/26 )\n- Đổi tên miền thành https://anh29.ct.ws/\n- Tăng cường bảo mật hệ thống\n- Thời gian bảo trì có thể lâu hơn dự kiến." },
    { id: 1773576758754, date: "2026-03-15", content: "Version V1.0_15326.DEMO.TEST\nThêm mới:\n- Cập nhật tính năng chấm điểm cho hệ thống Speaking và Writing\n- Tăng cường bảo mật hệ thống, đồng bộ dữ liệu giữa các trang. \n- Cập nhật giao diện Thống kê đồng bộ cho cả Laptop và Mobile." },
    { id: 1773577732793, date: "2026-03-14", content: "Version V1.0_14326.DEMO.TEST\nSửa lỗi :\n- Một số mẫu Mobile không hiển thị giao diện\nThêm mới:\n- Giờ đây bạn có thể xem cập nhật tại trang hồ sơ" },
    { id: 1707555200000, date: "2026-02-09", content: "Version V1.0\nRa mắt phiên bản EAnh v1.0\nTình trạng: Đã xong" }
];
  ////////////
  ///////////
  //////////
  /////////
  //////////
  
let logs = JSON.parse(JSON.stringify(defaultData));
const PER_PAGE = 3;
let currentPage = 1;

function getSorted(){ return [...logs].sort((a,b)=>new Date(b.date)-new Date(a.date)); }

function fmtDate(d){
  const obj = new Date(d);
  if(isNaN(obj)) return d;
  return obj.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function totalPages(){ return Math.max(1, Math.ceil(getSorted().length / PER_PAGE)); }

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  const sorted = getSorted();
  const total  = totalPages();
  if(currentPage > total) currentPage = total;
  const start    = (currentPage-1)*PER_PAGE;
  const pageItems = sorted.slice(start, start+PER_PAGE);

  // Count
  document.getElementById('log-count').textContent =
    `${sorted.length} bản ghi · trang ${currentPage}/${total}`;

  // List
  const list = document.getElementById('log-list');
  list.innerHTML = '';
  if(!pageItems.length){
    list.innerHTML = '<div class="empty">Chưa có dữ liệu.</div>';
  } else {
    pageItems.forEach(log => {
      const div = document.createElement('div');
      div.className = 'log-item';
      div.innerHTML =
        `<div class="log-date">${fmtDate(log.date)}</div>` +
        `<div class="log-content">${escHtml(log.content)}</div>` +
        (isAdmin
          ? `<div class="log-actions">
               <button class="btn-edit" onclick="editLog(${log.id})">✏️ Sửa</button>
               <button class="btn-del"  onclick="deleteLog(${log.id})">🗑 Xóa</button>
             </div>`
          : '');
      list.appendChild(div);
    });
  }

  // Pagination
  const pg = document.getElementById('pagination');
  pg.innerHTML = '';

  const btnPrev = document.createElement('button');
  btnPrev.className = 'page-btn';
  btnPrev.textContent = '← Trước';
  btnPrev.disabled = currentPage === 1;
  btnPrev.onclick = ()=>{ currentPage--; render(); };
  pg.appendChild(btnPrev);

  for(let i=1;i<=total;i++){
    const btn = document.createElement('button');
    btn.className = 'page-btn'+(i===currentPage?' active':'');
    btn.textContent = i;
    btn.onclick = (p=>()=>{ currentPage=p; render(); })(i);
    pg.appendChild(btn);
  }

  const btnNext = document.createElement('button');
  btnNext.className = 'page-btn';
  btnNext.textContent = 'Sau →';
  btnNext.disabled = currentPage === total;
  btnNext.onclick = ()=>{ currentPage++; render(); };
  pg.appendChild(btnNext);

  const info = document.createElement('div');
  info.className = 'page-info';
  info.textContent = `${start+1}–${Math.min(start+PER_PAGE,sorted.length)} / ${sorted.length}`;
  pg.appendChild(info);
}

function saveLog(){
  const dateInput    = document.getElementById('log-date').value;
  const contentInput = document.getElementById('log-content').value.trim();
  const editId       = document.getElementById('edit-id').value;
  if(!dateInput || !contentInput){ alert('Vui lòng nhập đầy đủ ngày và nội dung!'); return; }
  if(editId){
    const i = logs.findIndex(l=>l.id==editId);
    if(i!==-1){ logs[i].date=dateInput; logs[i].content=contentInput; }
    document.getElementById('edit-id').value='';
  } else {
    logs.push({id:Date.now(), date:dateInput, content:contentInput});
    currentPage=1;
  }
  document.getElementById('log-date').value='';
  document.getElementById('log-content').value='';
  generateCode();
  render();
}

function generateCode(){
  const sorted = [...logs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const lines  = sorted.map(l=>{
    const esc = l.content.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/"/g,'\\"').replace(/\n/g,'\\n');
    return `    { id: ${l.id}, date: "${l.date}", content: "${esc}" }`;
  });
  document.getElementById('generated-code').value = `const defaultData = [\n${lines.join(',\n')}\n];`;
  document.getElementById('copy-box').style.display = 'block';
}

function copyCode(){
  const ta = document.getElementById('generated-code');
  ta.select();
  document.execCommand('copy');
  alert('✅ Đã copy! Dán vào file HTML thay thế đoạn const defaultData = [...]');
}

function editLog(id){
  const log = logs.find(l=>l.id==id);
  if(log){
    document.getElementById('log-date').value    = log.date;
    document.getElementById('log-content').value = log.content;
    document.getElementById('edit-id').value     = log.id;
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

function deleteLog(id){
  if(confirm('Xóa bản ghi này?')){
    logs = logs.filter(l=>l.id!=id);
    generateCode();
    render();
  }
}

render();
</script>
</body>
</html>
