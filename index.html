<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bảo trì - EAnh</title>
    <style>
        :root {
            --primary-glow: #00f2fe;
            --secondary-glow: #4facfe;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* Header & Info */
        header {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            background: -webkit-linear-gradient(var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .credits p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .eanh-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
            color: #000;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .eanh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        /* Admin Panel (Form thêm/sửa) */
        .admin-panel {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .action-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .action-btn:hover { background: #218838; }

        /* Changelog List */
        .changelog-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .log-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border-left: 5px solid var(--primary-glow);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .log-date {
            font-size: 14px;
            color: var(--secondary-glow);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .log-content {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }

        .log-actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
            font-size: 13px;
            transition: 0.2s;
        }

        .log-actions button.edit-btn:hover { background: #ffc107; color: #000; }
        .log-actions button.delete-btn:hover { background: #dc3545; }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .eanh-btn {
                position: relative;
                display: inline-block;
                top: 0;
                right: 0;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Chi tiết bảo trì - EAnh</h1>
        <div class="credits">
            <p>Developer: Nguyen Hoang Anh</p>
            <p>Tester: Nguyen Hoang Anh</p>
            <p>Design: Nguyen Hoang Anh</p>
            <p>Nickname: Zn</p>
        </div>
        <a href="https://zn29.ct.ws/" target="_blank" class="eanh-btn">EAnh</a>
    </header>

    <div class="admin-panel">
        <h3 style="margin-bottom: 10px; font-size: 18px;">Thêm / Cập nhật bảo trì</h3>
        <input type="hidden" id="edit-id">
        <input type="date" id="log-date">
        <textarea id="log-content" placeholder="Nhập nội dung bảo trì..."></textarea>
        <button class="action-btn" onclick="saveLog()">Lưu thông tin</button>
    </div>

    <div class="changelog-list" id="logs-container">
        </div>
</div>

<script>
    // Khởi tạo mảng dữ liệu từ LocalStorage hoặc mảng rỗng
    let logs = JSON.parse(localStorage.getItem('eanh_changelogs')) || [];

    function renderLogs() {
        const container = document.getElementById('logs-container');
        container.innerHTML = '';

        // Sắp xếp ngày mới nhất lên đầu
        logs.sort((a, b) => new Date(b.date) - new Date(a.date));

        logs.forEach(log => {
            const div = document.createElement('div');
            div.className = 'log-item';
            
            // Format lại ngày cho dễ nhìn (DD/MM/YYYY)
            const dateObj = new Date(log.date);
            const formattedDate = !isNaN(dateObj) ? dateObj.toLocaleDateString('vi-VN') : 'Chưa có ngày';

            div.innerHTML = `
                <div class="log-date">🕒 Ngày: ${formattedDate}</div>
                <div class="log-content">${log.content}</div>
                <div class="log-actions">
                    <button class="edit-btn" onclick="editLog(${log.id})">Sửa</button>
                    <button class="delete-btn" onclick="deleteLog(${log.id})">Xóa</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function saveLog() {
        const dateInput = document.getElementById('log-date').value;
        const contentInput = document.getElementById('log-content').value;
        const editId = document.getElementById('edit-id').value;

        if (!dateInput || !contentInput.trim()) {
            alert("Vui lòng nhập đầy đủ ngày và nội dung!");
            return;
        }

        if (editId) {
            // Chế độ sửa
            const index = logs.findIndex(l => l.id == editId);
            if(index !== -1) {
                logs[index].date = dateInput;
                logs[index].content = contentInput;
            }
            document.getElementById('edit-id').value = '';
        } else {
            // Chế độ thêm mới
            const newLog = {
                id: Date.now(), // Tạo ID ngẫu nhiên bằng timestamp
                date: dateInput,
                content: contentInput
            };
            logs.push(newLog);
        }

        // Lưu vào LocalStorage và render lại
        localStorage.setItem('eanh_changelogs', JSON.stringify(logs));
        
        // Reset form
        document.getElementById('log-date').value = '';
        document.getElementById('log-content').value = '';
        
        renderLogs();
    }

    function editLog(id) {
        const log = logs.find(l => l.id == id);
        if(log) {
            document.getElementById('log-date').value = log.date;
            document.getElementById('log-content').value = log.content;
            document.getElementById('edit-id').value = log.id;
            window.scrollTo({ top: 0, behavior: 'smooth' }); // Cuộn lên form
        }
    }

    function deleteLog(id) {
        if(confirm("Bạn có chắc chắn muốn xóa nhật ký bảo trì này không?")) {
            logs = logs.filter(l => l.id != id);
            localStorage.setItem('eanh_changelogs', JSON.stringify(logs));
            renderLogs();
        }
    }

    // Hiển thị dữ liệu khi vừa load trang
    renderLogs();
</script>

</body>
</html>
